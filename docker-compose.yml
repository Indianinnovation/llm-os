services:
  # Container A: the inference engine. No published ports — only the
  # kernel can reach it, over the internal network.
  llm-engine:
    image: ollama/ollama:latest
    container_name: llm_engine
    volumes:
      - ollama_storage:/root/.ollama
    networks: [llmos_internal]
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4096M

  # Container B: the routing kernel + tools + audit log.
  llm-os-kernel:
    build: .
    container_name: llm_os_kernel
    depends_on: [llm-engine]
    environment:
      - OLLAMA_HOST=http://llm-engine:11434
      - LLM_OS_MODEL=${LLM_OS_MODEL:-llama3.2}
      - SCRATCHPAD_DIR=/app/scratchpad
      - AUDIT_DIR=/app/audit
      - MEMORY_DIR=/app/memory_store
    volumes:
      - ./scratchpad:/app/scratchpad
      - ./audit:/app/audit
      - ./memory_store:/app/memory_store
    networks: [llmos_internal, llmos_edge]
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M

  # Container C: the web console. Talks only to the kernel.
  llm-os-ui:
    build: .
    container_name: llm_os_ui
    command: ["streamlit", "run", "ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on: [llm-os-kernel]
    environment:
      - KERNEL_URL=http://llm-os-kernel:8000
      - SCRATCHPAD_DIR=/app/scratchpad
    volumes:
      - ./scratchpad:/app/scratchpad:ro
    networks: [llmos_edge]
    ports:
      - "127.0.0.1:8501:8501"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  # The engine lives on an internal-only network: no route to the
  # outside world. This is the enforced zero-egress boundary.
  llmos_internal:
    internal: true
  llmos_edge:

volumes:
  ollama_storage:
